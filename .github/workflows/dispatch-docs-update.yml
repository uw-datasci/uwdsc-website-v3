name: Dispatch Docs Update

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch Docs Update
    uses: uw-datasci/nexus-workflows/.github/workflows/dispatch-docs-update.yml@v4
    with:
      app-name: "🎯 Main Website"
      section-map: |
        apps/web => 🎯 Main Website
        apps/admin => 🛠️ Admin
    secrets:
      DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
