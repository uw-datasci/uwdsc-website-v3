name: CI Quality Gate

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.33.0
  INFISICAL_PROJECT_SLUG: uwdsc-54e-y

jobs:
  setup:
    name: Setup Variables
    if: ${{ !startsWith(github.head_ref, 'auto-docs/merge-') }}
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ env.NODE_VERSION }}
      pnpm-version: ${{ env.PNPM_VERSION }}
      infisical-project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
    steps:
      - name: Output variables
        run: echo "Variables mapped to outputs."

  code-quality:
    name: Code Quality
    needs: setup
    uses: uw-datasci/nexus-workflows/.github/workflows/quality-gate.yml@v4
    with:
      node-version: ${{ needs.setup.outputs.node-version }}
      pnpm-version: ${{ needs.setup.outputs.pnpm-version }}
      lint-command: pnpm exec turbo lint
      typecheck-command: pnpm exec turbo check-types
    secrets:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  build-web:
    name: Build - Web
    needs: [setup, code-quality]
    uses: uw-datasci/nexus-workflows/.github/workflows/build-node.yml@v4
    with:
      node-version: ${{ needs.setup.outputs.node-version }}
      pnpm-version: ${{ needs.setup.outputs.pnpm-version }}
      build-command: pnpm exec turbo build --filter=web...
      infisical-project-slug: ${{ needs.setup.outputs.infisical-project-slug }}
      infisical-secret-path: /web
    secrets:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  build-admin:
    name: Build - Admin
    needs: [setup, code-quality]
    uses: uw-datasci/nexus-workflows/.github/workflows/build-node.yml@v4
    with:
      node-version: ${{ needs.setup.outputs.node-version }}
      pnpm-version: ${{ needs.setup.outputs.pnpm-version }}
      build-command: pnpm exec turbo build --filter=admin...
      infisical-project-slug: ${{ needs.setup.outputs.infisical-project-slug }}
      infisical-secret-path: /admin
    secrets:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  quality-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build-web, build-admin]
    if: always()
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Post Quality Gate Summary
        uses: uw-datasci/nexus-quality-summary@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          code-quality-result: ${{ needs.code-quality.result }}
          build-result: ${{ needs.build-web.result == 'success' && needs.build-admin.result == 'success' && 'success' || 'failure' }}
