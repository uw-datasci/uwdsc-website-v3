<title>Gacha Reveal — Cartoon/Manga Globe</title>
<style>
  :root{ --bg:#070708; --ink:#f4f4f0; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--ink);user-select:none;-webkit-touch-callout:none;
    touch-action:none;overscroll-behavior:none;cursor:crosshair;
    background:radial-gradient(ellipse at 50% 42%, #15161a 0%, #0a0a0c 58%, #050506 100%);
    font-family:-apple-system,Inter,Segoe UI,sans-serif;}
  canvas{position:fixed;inset:0;}
  #gl{z-index:1;filter:url(#sketch);} #fx{z-index:4;pointer-events:none;}
  #impact{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;mix-blend-mode:difference;background:#ffffff;}
  #flash{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0;mix-blend-mode:screen;
    background:radial-gradient(circle at 50% 50%, #ffffff 0%, #ffffff 22%, transparent 55%);}
  #white{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;background:#fff;}
  #editor{position:fixed;z-index:7;bottom:14px;left:18px;font:10px/1.4 ui-monospace,Menlo,monospace;white-space:pre;color:#0a0;background:rgba(0,0,0,.4);padding:6px 9px;border:1px solid #0f03;display:none;max-width:46vw;pointer-events:none;}
  #copyBtn{position:fixed;z-index:8;top:18px;left:18px;display:none;font:12px ui-monospace,monospace;color:#0f0;background:#000a;border:1px solid #0f0;padding:7px 14px;cursor:pointer;}
  #copyBtn:hover{background:#0f0;color:#000;}
  #addBtn{position:fixed;z-index:8;top:18px;left:86px;display:none;font:12px ui-monospace,monospace;color:#0f0;background:#000a;border:1px solid #0f0;padding:7px 14px;cursor:pointer;}
  #addStarBtn{position:fixed;z-index:8;top:54px;left:86px;display:none;font:12px ui-monospace,monospace;color:#0f0;background:#000a;border:1px solid #0f0;padding:7px 14px;cursor:pointer;}
  #addStarBtn:hover{background:#0f0;color:#000;}
  #loading{position:fixed;inset:0;z-index:30;background:#08080c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .6s ease;color:#cfcfcf;font:14px ui-monospace,Menlo,monospace;letter-spacing:.18em;}
  #perf{position:fixed;z-index:40;top:8px;left:8px;display:none;font:11px/1.4 ui-monospace,Menlo,monospace;color:#8f8;background:rgba(0,0,0,.72);border:1px solid #0f04;border-radius:5px;max-width:230px;user-select:none;}
  #perfBar{padding:6px 9px;cursor:pointer;white-space:nowrap;color:#cfc;}
  #perfBar b{color:#7fff9f;}
  #perf.collapsed #perfBody{display:none;}
  #perfBody{padding:4px 8px 8px;max-height:78vh;overflow:auto;border-top:1px solid #0f03;}
  #perfBody .pg{color:#6c9;margin:7px 0 2px;letter-spacing:.06em;text-transform:uppercase;font-size:9px;}
  #perfBody .pr{display:flex;align-items:center;gap:6px;margin:2px 0;color:#bdc;}
  #perfBody .pr span{flex:1;}
  #perfBody .pr input[type=range]{width:82px;accent-color:#3f6;}
  #perfBody .pr b{width:30px;text-align:right;color:#7fff9f;}
  #perfBody .prow{display:flex;gap:5px;margin:2px 0 6px;}
  #perfBody .prow button{flex:1;font:10px ui-monospace,monospace;color:#3f6;background:#000a;border:1px solid #0f05;border-radius:3px;padding:3px;cursor:pointer;}
  #perfBody .prow button:hover{background:#3f6;color:#000;}
  #loading.done{opacity:0;pointer-events:none;}
  #loading .lspin{width:38px;height:38px;border:2px solid #333;border-top-color:#ddd;border-radius:50%;animation:lsp .8s linear infinite;}
  @keyframes lsp{to{transform:rotate(360deg);}}
  #addBtn:hover{background:#0f0;color:#000;}
  #objType{position:fixed;z-index:8;top:18px;left:172px;display:none;font:12px ui-monospace,monospace;color:#0f0;background:#000a;border:1px solid #0f0;padding:6px;}
  #sizeSlider{position:fixed;z-index:8;top:22px;left:290px;width:150px;display:none;accent-color:#0f0;}
  #ctrl{position:fixed;z-index:8;top:56px;left:290px;display:none;background:rgba(0,0,0,.5);padding:6px 8px;border:1px solid #0f04;}
  #ctrl label{display:flex;align-items:center;gap:6px;color:#0f0;font:11px ui-monospace,monospace;margin:2px 0;}
  #ctrl input{width:150px;accent-color:#0f0;}
  #title,#shaderBtn,#bar,#again,#label{display:none!important;}   /* removed UI chrome: title, diamond toggle, charge bar, again, GET!! label */
  #speed{display:none;}
  #vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.5) 72%, rgba(0,0,0,.9) 100%);}
  #grain{display:none;}
  #title{position:fixed;z-index:6;top:max(22px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    font-size:clamp(10px,2.6vw,12px);letter-spacing:.32em;text-transform:uppercase;opacity:.45;white-space:nowrap;}
  #hud{position:fixed;z-index:6;left:50%;bottom:max(30px,env(safe-area-inset-bottom));transform:translateX(-50%);text-align:center;width:min(360px,84vw);}
  #hint{font-size:clamp(11px,3vw,13px);letter-spacing:.28em;text-transform:uppercase;opacity:.6;margin-bottom:13px;}
  #bar{height:8px;border:1.5px solid rgba(244,244,240,.55);overflow:hidden;background:rgba(244,244,240,.06);}
  #fill{height:100%;width:0%;background:var(--ink);transition:width .1s;}
  #again{margin-top:18px;display:none;font:inherit;font-size:clamp(13px,3.4vw,15px);letter-spacing:.08em;border:2px solid var(--ink);
    color:var(--ink);background:transparent;padding:10px 28px;cursor:pointer;text-transform:uppercase;box-shadow:5px 5px 0 var(--ink);}
  #again:active,#again:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 var(--ink);background:var(--ink);color:#0a0a0c;}
  #label{position:fixed;z-index:6;left:50%;top:50%;transform:translate(-50%,clamp(110px,22vh,160px)) rotate(-4deg) scale(.6);text-align:center;opacity:0;
    transition:opacity .35s, transform .35s cubic-bezier(.2,1.6,.4,1);}
  #label.on{opacity:1;transform:translate(-50%,clamp(110px,22vh,160px)) rotate(-4deg) scale(1);}
  #label .n{font-family:"Arial Black",Impact,sans-serif;font-size:clamp(34px,9vw,58px);font-style:italic;letter-spacing:.02em;color:var(--ink);text-shadow:5px 5px 0 #000,-1px -1px 0 #000;}
  #label .r{font-size:clamp(11px,3vw,13px);letter-spacing:.32em;text-transform:uppercase;opacity:.7;margin-top:6px;}
  #shaderBtn{position:fixed;z-index:6;top:max(18px,env(safe-area-inset-top));right:18px;font:inherit;
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:rgba(244,244,240,.07);
    border:1px solid rgba(244,244,240,.4);padding:7px 13px;cursor:pointer;}
  #shaderBtn:hover{background:var(--ink);color:#0a0a0c;}
  #err{position:fixed;z-index:9;inset:0;display:none;align-items:center;justify-content:center;padding:40px;text-align:center;font-size:18px;background:var(--bg);}
</style>

<body>
<svg width="0" height="0" aria-hidden="true" style="position:absolute"><defs>
  <filter id="sketch" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
    <feTurbulence id="sketchNoise" type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="1" result="n"/>
    <feDisplacementMap id="sketchDisp" in="SourceGraphic" in2="n" scale="19" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>
<canvas id="gl"></canvas>
<div id="flash"></div>

<input id="sizeSlider" type="range" min="0.4" max="12" step="0.1" value="1.8">
<div id="ctrl">
  <label>Y&nbsp;<input id="hSlider" type="range" min="-8" max="18" step="0.1" value="3"></label>
  <label>rX<input id="rotX" type="range" min="-3.15" max="3.15" step="0.01" value="0"></label>
  <label>rY<input id="rotY" type="range" min="-3.15" max="3.15" step="0.01" value="0"></label>

  <div id="perfBody"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './addons/loaders/GLTFLoader.js';
import { mergeGeometries } from './addons/utils/BufferGeometryUtils.js';
const errEl=document.getElementById('err');
window.addEventListener('error',e=>{errEl.style.display='flex';errEl.textContent='Load error: '+e.message;});
addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

const MOBILE=(matchMedia('(pointer:coarse)').matches)||innerWidth<820;
const DPR=Math.min(devicePixelRatio, 1.0);
// ---- PERF: single source of truth for every lag knob (tuned live via the ?perf panel) ----
const PERF={dpr:DPR, wobble:true, reseedHz:9, wobbleScale:19, relief:true, craters:true, grain:true, maria:true, glyphs:(MOBILE?220:380), stars:true, deco:true, impactFX:true, invert:true};
function pApplyRes(){var m=(typeof state!=='undefined'&&state==='charging')?1:0.7;renderer.setPixelRatio(PERF.dpr*m);renderer.setSize(innerWidth,innerHeight,false);moonMat.uniforms.uHscale.value=300*PERF.dpr*m;}
function pApplyWobble(){glEl.style.filter=PERF.wobble?'url(#sketch)':'none';var d=document.getElementById('sketchDisp');if(d)d.setAttribute('scale',PERF.wobbleScale);}
function pApplyMoon(){moonMat.uniforms.uRelief.value=PERF.relief?1:0;moonMat.uniforms.uCratersOn.value=PERF.craters?1:0;moonMat.uniforms.uGrainOn.value=PERF.grain?1:0;moonMat.uniforms.uMariaOn.value=PERF.maria?1:0;}
function pApplyScene(){stars.visible=PERF.stars;spaceStuff.visible=PERF.deco;}
function pApplyAll(){pApplyRes();pApplyWobble();pApplyMoon();pApplyScene();}
const PERFON=/[?&]perf|[?&]fps/.test(location.search);let pfN=0,pfAcc=0;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gl'),antialias:false,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(DPR);renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);camera.position.set(0,0,4.0);
const L1=new THREE.Vector3(0.5,0.85,0.7).normalize(),L2=new THREE.Vector3(-0.7,0.1,0.4).normalize();
let scaleBase=1.4;
function fitScale(){scaleBase=(innerWidth<innerHeight)?Math.max(0.92,innerWidth/innerHeight*1.18):1.4;}
fitScale();

const sprite=(()=>{const c=document.createElement('canvas');c.width=c.height=32;const x=c.getContext('2d');
  const g=x.createRadialGradient(16,16,0,16,16,16);g.addColorStop(0,'#fff');g.addColorStop(.45,'#ffffffcc');g.addColorStop(1,'#ffffff00');
  x.fillStyle=g;x.beginPath();x.arc(16,16,16,0,7);x.fill();return new THREE.CanvasTexture(c);})();

// starfield (white)
const NS=MOBILE?900:1700,sp=new Float32Array(NS*3);
for(let i=0;i<NS;i++){const r=7+Math.random()*9,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(ph)*Math.cos(th);sp[i*3+1]=r*Math.sin(ph)*Math.sin(th);sp[i*3+2]=r*Math.cos(ph);}
const sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
const stars=new THREE.Points(sGeo,new THREE.PointsMaterial({size:0.07,map:sprite,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,color:0xffffff}));scene.add(stars);

// ---------- CARTOON/MANGA EARTH (colour) that SHATTERS into triangle shards ----------
const manager=new THREE.LoadingManager();const tl=new THREE.TextureLoader(manager);
const earthTex=tl.load('assets/textures/00_earthmap1k.jpg');earthTex.colorSpace=THREE.SRGBColorSpace;
const specTex=tl.load('assets/textures/02_earthspec1k.jpg');specTex.colorSpace=THREE.NoColorSpace;
const paperTex=tl.load('assets/textures/paper.png');paperTex.colorSpace=THREE.SRGBColorSpace;paperTex.wrapS=paperTex.wrapT=THREE.RepeatWrapping;
const hatchTex=tl.load('assets/textures/hatch.png');hatchTex.colorSpace=THREE.NoColorSpace;hatchTex.wrapS=hatchTex.wrapT=THREE.RepeatWrapping;
// hoisted BOIL params: the 8fps redraw rotation+offset are constant across a frame, so they're
// computed ONCE per frame on the CPU (see frame()) instead of per-pixel in the shaders — saves
// 2 sin + 1 cos + 2 fract on every earth/letter pixel. Shared by earthMat + the DSC letters.
const BOILR={value:new THREE.Vector2(1,0)},BOILO={value:new THREE.Vector2(0,0)};let boilFr=-1;

// build shard-ready sphere: non-indexed + per-triangle centroid & random
let eg=new THREE.SphereGeometry(1, MOBILE?52:70, MOBILE?32:44).toNonIndexed();
{ const pos=eg.attributes.position, N=pos.count, aC=new Float32Array(N*3), aR=new Float32Array(N);
  for(let i=0;i<N;i+=3){const cx=(pos.getX(i)+pos.getX(i+1)+pos.getX(i+2))/3,cy=(pos.getY(i)+pos.getY(i+1)+pos.getY(i+2))/3,cz=(pos.getZ(i)+pos.getZ(i+1)+pos.getZ(i+2))/3;
    const rnd=Math.random();for(let j=0;j<3;j++){aC[(i+j)*3]=cx;aC[(i+j)*3+1]=cy;aC[(i+j)*3+2]=cz;aR[i+j]=rnd;}}
  eg.setAttribute('aCen',new THREE.BufferAttribute(aC,3));eg.setAttribute('aRnd',new THREE.BufferAttribute(aR,1)); }

const globe=new THREE.Group();globe.rotation.x=0.30;globe.scale.setScalar(scaleBase);scene.add(globe);
const earthMat=new THREE.ShaderMaterial({transparent:true,depthWrite:true,side:THREE.FrontSide,uniforms:{
  specTex:{value:specTex},paperTex:{value:paperTex},hatchTex:{value:hatchTex},
  uL1:{value:L1},uL2:{value:L2},uFade:{value:1},uChg:{value:0},uTime:{value:0},uBurst:{value:0},uHscale:{value:300.0*DPR},uRes:{value:new THREE.Vector2(innerWidth*DPR,innerHeight*DPR)},uGR:{value:300.0},uPulse:{value:9.0},uBoilR:BOILR,uBoilO:BOILO},
  vertexShader:`attribute vec3 aCen;attribute float aRnd;uniform float uBurst;
    varying vec2 vUv;varying vec3 vN;varying vec3 vView;
    vec3 rax(vec3 v,vec3 ax,float a){return v*cos(a)+cross(ax,v)*sin(a)+ax*dot(ax,v)*(1.0-cos(a));}
    void main(){vUv=uv;
      vec3 dir=normalize(aCen);
      vec3 loc=position-aCen;
      float ang=uBurst*(aRnd*7.0-3.5);
      vec3 sp=aCen + rax(loc,dir,ang) + dir*uBurst*(0.5+aRnd*1.6);   // triangle flies outward + tumbles
      vN=normalize(mat3(modelMatrix)*normal);
      vec3 wp=(modelMatrix*vec4(sp,1.0)).xyz;vView=cameraPosition-wp;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(sp,1.0);}`,
  fragmentShader:`precision highp float;uniform sampler2D specTex,paperTex,hatchTex;uniform vec3 uL1,uL2;uniform float uFade,uChg,uHscale,uTime,uGR,uPulse;uniform vec2 uRes,uBoilR,uBoilO;
    varying vec2 vUv;varying vec3 vN;
    float ov(float a,float b){return a<0.5?2.0*a*b:1.0-2.0*(1.0-a)*(1.0-b);}   // overlay blend
    void main(){
      vec3 N=normalize(vN);
      // two-light shade (ported from sketch-shader-spec): Sun 5.0 + fill 3.0
      float nMain=max(dot(N,normalize(uL1)),0.0), nFill=max(dot(N,normalize(uL2)),0.0);
      float shade=clamp(0.32*(5.0*nMain+3.0*nFill)/3.14159 + 0.20, 0.0,1.0);
      shade=ov(shade,0.46);                                        // overlay tone-map
      float land=1.0-texture2D(specTex,vUv).r;                     // continents -> more ink
      float sh=clamp(shade - land*0.42 - uChg*0.05, 0.0,1.0);
      float t=1.0-sh;
      // BOILED: each frame samples a DIFFERENT region + rotation of the chaotic sheet -> genuinely redrawn strokes
      // (rotation+offset are per-frame constants, hoisted to uBoilR/uBoilO on the CPU)
      mat2 Rm=mat2(uBoilR.x,-uBoilR.y,uBoilR.y,uBoilR.x);
      vec2 hq=(Rm*gl_FragCoord.xy + uBoilO)/uHscale;
      vec3 hx=texture2D(hatchTex, hq).rgb;
      float i0=smoothstep(0.20,0.50,t), i1=smoothstep(0.42,0.74,t), i2=smoothstep(0.66,1.0,t);
      float m0=mix(1.0,hx.r,i0); float m1=m0*mix(1.0,hx.g,i1); float m2=m1*mix(1.0,hx.b,i2);
      vec3 paper=vec3(0.95)*mix(vec3(1.0),texture2D(paperTex,gl_FragCoord.xy/620.0).rgb,0.12);
      vec3 col=mix(vec3(0.04), paper, clamp(m2,0.0,1.0));          // ink <-> paper
      // per-click radial shockwave across the earth (brighter the more charged)
      float pr=length(gl_FragCoord.xy-uRes*0.5)/uGR;
      float pring=smoothstep(0.22,0.0,abs(pr-uPulse*3.6))*exp(-uPulse*5.0)*(0.5+uChg*1.1);
      col+=pring;
      gl_FragColor=vec4(col, uFade);
    }`});
const earth=new THREE.Mesh(eg,earthMat);globe.add(earth);
// ---------- DSC letters floating, wrapped around the globe (pencil texture + wobbly, like the earth) ----------
const dscRedraw=[];
function letterTex(ch){const cv=document.createElement('canvas');cv.width=cv.height=128;const x=cv.getContext('2d');const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  function draw(){x.clearRect(0,0,128,128);x.font='110px "Bangers","Arial Black",sans-serif';x.textAlign='center';x.textBaseline='middle';
    x.lineJoin='round';x.lineWidth=15;x.strokeStyle='#ffffff';x.strokeText(ch,64,72);   // white outline
    x.fillStyle='#141414';x.fillText(ch,64,72);tex.needsUpdate=true;}                    // black fill
  draw();dscRedraw.push(draw);return tex;}
function dscGeo(){var g=new THREE.PlaneGeometry(0.62,0.62,6,6).toNonIndexed();var pos=g.attributes.position,N=pos.count,aC=new Float32Array(N*3),aR=new Float32Array(N);
  for(var i=0;i<N;i+=3){var cx=(pos.getX(i)+pos.getX(i+1)+pos.getX(i+2))/3,cy=(pos.getY(i)+pos.getY(i+1)+pos.getY(i+2))/3,cz=(pos.getZ(i)+pos.getZ(i+1)+pos.getZ(i+2))/3,rnd=Math.random();
    for(var j=0;j<3;j++){aC[(i+j)*3]=cx;aC[(i+j)*3+1]=cy;aC[(i+j)*3+2]=cz;aR[i+j]=rnd;}}
  g.setAttribute('aCen',new THREE.BufferAttribute(aC,3));g.setAttribute('aRnd',new THREE.BufferAttribute(aR,1));return g;}
function dscMat(tex){return new THREE.ShaderMaterial({transparent:true,depthWrite:false,depthTest:false,side:THREE.DoubleSide,
  uniforms:{tex:{value:tex},hatchTex:{value:hatchTex},uTime:{value:0},uHscale:{value:300.0*DPR},uBurst:{value:0},uFade:{value:1},uBoilR:BOILR,uBoilO:BOILO},
  vertexShader:`attribute vec3 aCen;attribute float aRnd;uniform float uBurst;varying vec2 vUv;
    vec3 rax(vec3 v,vec3 ax,float a){return v*cos(a)+cross(ax,v)*sin(a)+ax*dot(ax,v)*(1.0-cos(a));}
    void main(){vUv=uv;vec3 dir=normalize(aCen+vec3(0.0,0.0,0.001));vec3 loc=position-aCen;
      vec3 sp=aCen + rax(loc,vec3(0.0,0.0,1.0),uBurst*(aRnd*7.0-3.5)) + dir*uBurst*(0.4+aRnd*1.3);   // shatter the letter into pieces
      gl_Position=projectionMatrix*modelViewMatrix*vec4(sp,1.0);}`,
  fragmentShader:`precision highp float;uniform sampler2D tex,hatchTex;uniform float uTime,uHscale,uFade;uniform vec2 uBoilR,uBoilO;varying vec2 vUv;
    void main(){vec4 t=texture2D(tex,vUv);if(t.a<0.3)discard;

  if(PERFON){pfN++;pfAcc+=dt;if(pfAcc>=0.5){var _f=document.getElementById('perfFps');if(_f){_f.textContent=Math.round(pfN/pfAcc);document.getElementById('perfCalls').textContent=renderer.info.render.calls;document.getElementById('perfTris').textContent=(renderer.info.render.triangles/1000).toFixed(0)+'k';}pfN=0;pfAcc=0;}}
  requestAnimationFrame(frame);}
addEventListener('resize',()=>{fitScale();camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);sizeFx();if(state==='charging')globe.scale.setScalar(scaleBase);
  toonMat.uniforms.uRes.value.set(innerWidth*DPR,innerHeight*DPR);toonMat.uniforms.uAspect.value=innerWidth/innerHeight;
  haloMat.uniforms.uRes.value.set(innerWidth*DPR,innerHeight*DPR);haloMat.uniforms.uAspect.value=innerWidth/innerHeight;
  earthMat.uniforms.uRes.value.set(innerWidth*DPR,innerHeight*DPR);});
reset();requestAnimationFrame(frame);
// ---- PRELOAD GATE: wait for all textures+models, pre-compile shaders + upload GPU textures, THEN allow play ----
const loadingEl=document.getElementById('loading');
function prewarm(){try{
  var pv=props.map(function(p){return p.visible;});props.forEach(function(p){p.visible=true;});
  var mv=moon.visible,dv=moonDecor.visible,rv=reward?reward.visible:false;
  moon.visible=true;moonDecor.visible=true;if(reward)reward.visible=true;
  renderer.compile(scene,camera);renderer.render(scene,camera);                                  // compile all shader programs
  var pc=camera.position.clone(),tc=camTgt.clone();camera.position.copy(CAM_MOON);camTgt.copy(CAM_TGT_MOON);camera.lookAt(camTgt);renderer.render(scene,camera);   // warm the moon-cam path + upload textures
  camera.position.copy(pc);camTgt.copy(tc);
  moon.visible=mv;moonDecor.visible=dv;if(reward)reward.visible=rv;props.forEach(function(p,i){p.visible=pv[i];});
}catch(e){}}
function finishLoad(){if(ready)return;prewarm();ready=true;if(loadingEl)loadingEl.classList.add('done');}
if(editMode||editMoon||/moonview|flightview|freeze|demo|record/.test(location.search)){ready=true;if(loadingEl)loadingEl.classList.add('done');if(/record/.test(location.search))window.__rec={hit:hit,reset:reset,info:function(){return state+'|'+charge.toFixed(2);}};}   // editors/debug/record: no gate (record exposes hit for the recorder)
else{manager.onLoad=finishLoad;setTimeout(finishLoad,9000);}                                       // normal: gate on all assets (with a safety fallback)
setEarthShader(earthMat);  // default: paper-texture manga hatch (the previous one, not the node-graph diamond)
if(location.search.includes('moonview')){moon.visible=true;globe.visible=false;spaceStuff.visible=false;reward.visible=true;reward.position.copy(RELIC_POS);reward.rotation.y=0;reward.scale.setScalar(RELIC_S);rewMat.uniforms.uReveal.value=1;outMat.uniforms.uReveal.value=1;camera.position.copy(CAM_MOON);camTgt.copy(RELIC_POS);state='settle';stt=0;}
if(location.search.includes('flightview')){globe.visible=false;spaceStuff.visible=false;moon.visible=true;beam.visible=false;payload.visible=true;camA.set(0,4.6,5.6);tgtA.set(0,1.6,0);state='descend';stt=0.5;}
if(editMoon){globe.visible=false;dscGroup.visible=false;spaceStuff.visible=false;moon.visible=true;reward.visible=false;beam.visible=false;payload.visible=false;splat.visible=false;camera.position.set(0,9,10);camTgt.set(0,0,-3);state='editmoon';}
if(editMode){reward.visible=false;beam.visible=false;payload.visible=false;moon.visible=false;splat.visible=false;   // clean editor: hide stray meshes
  sizeSlider.style.display='block';sizeSlider.oninput=function(){if(selObj)selObj.scale.setScalar(+(+sizeSlider.value).toFixed(2));};
  addBtn.style.display='block';addBtn.textContent='+ add';objType.style.display='block';
  addBtn.onclick=function(){var t=objType.value;var m=makeBody(t,0.18);m.position.set(0,0,-1.0);m.userData.label=t+spaceStuff.children.length;spaceStuff.add(m);selObj=m;dragObj=m;sizeSlider.value=1;};}
if(editMode||editMoon){copyBtn.style.display='block';copyBtn.onclick=function(){var txt=editMoon?('CRATERS=['+CRATERS.map(function(c){return '['+c[0]+','+c[1]+','+c[2]+']';}).join(',')+'];'+props.map(function(p){return '\n'+(p.userData.name||'PROP')+' pos=['+p.position.x.toFixed(2)+','+p.position.y.toFixed(2)+','+p.position.z.toFixed(2)+'] s='+p.scale.x.toFixed(2)+' rot=['+p.rotation.x.toFixed(2)+','+p.rotation.y.toFixed(2)+','+p.rotation.z.toFixed(2)+']'+(p.userData.kind==='earth'?' sep='+earthriseMat.uniforms.uBreak.value.toFixed(2):'');}).join('')):spaceStuff.children.map(function(o){return (o.userData.label||'?')+':['+o.position.x.toFixed(2)+','+o.position.y.toFixed(2)+','+o.position.z.toFixed(2)+'] s='+o.scale.x.toFixed(2);}).join('\n');
  navigator.clipboard.writeText(txt).then(function(){copyBtn.textContent='copied!';setTimeout(function(){copyBtn.textContent='copy';},1200);}).catch(function(){copyBtn.textContent='(copy failed)';});};}
if(editMoon){addBtn.style.display='block';addStarBtn.style.display='block';sizeSlider.style.display='block';ctrlEl.style.display='block';
  hSlider.oninput=function(){if(selProp){selProp.position.y=+hSlider.value;if(selProp.userData.kind==='star')selProp.userData.by=+hSlider.value;dPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0,1,0),selProp.position);}};   // 3rd axis (height)
  rotX.oninput=function(){if(selProp)selProp.rotation.x=+rotX.value;};rotY.oninput=function(){if(selProp)selProp.rotation.y=+rotY.value;};rotZ.oninput=function(){if(selProp)selProp.rotation.z=+rotZ.value;};
  addStarBtn.onclick=function(){var m=makeMoonStar(0.8,0,3,-3);m.visible=true;selProp=m;dragProp=false;selC=-1;sizeSlider.value=0.8;dPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0,1,0),m.position);syncCtrl();};   // add a star (drag=X/Z, sliders=height+rotation+size)
  addBtn.onclick=function(){if(CRATERS.length<MAXC){CRATERS.push([0,-3,1.8]);selC=CRATERS.length-1;dragC=-1;sizeSlider.value=1.8;syncCraters();}};   // add a crater (then drag it)
  sizeSlider.oninput=function(){if(selProp){if(selProp.userData.kind==='earth'){earthriseMat.uniforms.uBreak.value=+(+sizeSlider.value).toFixed(2);}else{selProp.scale.setScalar(+(+sizeSlider.value).toFixed(2));if(selProp.userData.kind!=='star')selProp.position.y=(selProp.userData.halfH||1)*selProp.scale.x+(selProp.userData.lift||0);}}else if(selC>=0){CRATERS[selC][2]=+(+sizeSlider.value).toFixed(2);syncCraters();}};}
addEventListener('contextmenu',function(e){if(!editMoon)return;e.preventDefault();setNDC(e);ray.setFromCamera(ndc,camera);var hit=ray.intersectObject(moon,false);if(hit.length){var p=hit[0].point,bi=-1,bd=1e9;for(var i=0;i<CRATERS.length;i++){var dd=Math.hypot(p.x-CRATERS[i][0],p.z-CRATERS[i][1]);if(dd<CRATERS[i][2]*1.4&&dd<bd){bd=dd;bi=i;}}if(bi>=0){CRATERS.splice(bi,1);syncCraters();}}});
if(location.search.includes('diamond'))setEarthShader(toonMat);
if(location.search.includes('demo')){let k=0;const iv=setInterval(()=>{hit(innerWidth/2,innerHeight/2);if(++k>=HITS)clearInterval(iv);},110);}

// ===== PERF PANEL + presets (?perf shows the tuner, ?q=high|med|low forces a tier) =====
{
  const GMAX=(MOBILE?220:380);
  const presets={
    high:{dpr:DPR,wobble:true,reseedHz:9,wobbleScale:19,relief:true,craters:true,grain:true,maria:true,glyphs:GMAX,stars:true,deco:true,impactFX:true,invert:true},
    med:{dpr:0.75,wobble:true,reseedHz:4,wobbleScale:15,relief:true,craters:true,grain:false,maria:true,glyphs:Math.round(GMAX*0.6),stars:true,deco:true,impactFX:true,invert:true},
    low:{dpr:0.55,wobble:false,reseedHz:0,wobbleScale:10,relief:false,craters:true,grain:false,maria:false,glyphs:80,stars:false,deco:true,impactFX:false,invert:false}
  };
  const qp=new URLSearchParams(location.search).get('q');

  // ---- AUTO-QUALITY GOVERNOR: nobody should ever see lag without touching anything ----
  // Start tier from ?q= > saved localStorage > device heuristics. After the load gate, measure
  // real FPS in ~1.6s windows: <45fps -> drop a tier (sticky, saved); >57fps sustained ~8s ->
  // earn one back. Off in edit/record/demo modes and when ?q= pins a tier.
  const TIERS=['high','med','low'];
  let saved=null;try{saved=localStorage.getItem('gachaQ');}catch(e){}
  let tier=(qp&&presets[qp])?qp
    :(saved&&presets[saved])?saved
    :(MOBILE||navigator.hardwareConcurrency<=4||(navigator.deviceMemory&&navigator.deviceMemory<=4))?'med'
    :'high';
  let autoQ=!(qp&&presets[qp])&&!/record|demo|freeze|edit/.test(location.search);
  function setTier(t,save){tier=t;Object.assign(PERF,presets[t]);pApplyAll();
    if(save){try{localStorage.setItem('gachaQ',t);}catch(e){}}
    var q=document.getElementById('perfQ');if(q)q.textContent=t;
    if(window.pRebuild)window.pRebuild();}
  setTier(tier,false);
  let gPrev=0,gAcc=0,gN=0,gHold=2.5,gGood=0;   // gHold = grace after load/tier-switch (skip the hitch)
  window.pGov=function(){var n=performance.now()/1000,d=n-gPrev;gPrev=n;
    if(!autoQ||!ready||document.hidden||d<=0||d>0.5){gAcc=0;gN=0;return;}   // ignore tab-switch gaps + pre-gate frames
    if(gHold>0){gHold-=d;return;}
    gAcc+=d;gN++;
    if(gAcc<1.6)return;
    var fps=gN/gAcc,i=TIERS.indexOf(tier);gAcc=0;gN=0;
    if(fps<45&&i<TIERS.length-1){setTier(TIERS[i+1],true);gHold=2.0;gGood=0;}
    else if(fps>57&&i>0){if(++gGood>=5){setTier(TIERS[i-1],true);gHold=2.0;gGood=0;}}
    else gGood=0;};

  if(PERFON){
    const perfEl=document.getElementById('perf'),body=document.getElementById('perfBody'),bar=document.getElementById('perfBar');
    perfEl.style.display='block';
    document.getElementById('perfQ').textContent=tier;
    body.addEventListener('input',function(){autoQ=false;});   // hand-tuning wins: stop the governor fighting you
    bar.onclick=function(){perfEl.classList.toggle('collapsed');document.getElementById('perfArrow').textContent=perfEl.classList.contains('collapsed')?'▸ perf':'▾ perf';};
    const controls=[
      {g:'Render'},{t:'range',k:'dpr',lbl:'resolution',min:0.4,max:1,step:0.05,apply:pApplyRes},
      {g:'Wobble filter'},{t:'bool',k:'wobble',lbl:'on',apply:pApplyWobble},{t:'range',k:'reseedHz',lbl:'reseed Hz',min:0,max:12,step:1},{t:'range',k:'wobbleScale',lbl:'displace',min:0,max:28,step:1,apply:pApplyWobble},
      {g:'Moon shader'},{t:'bool',k:'craters',lbl:'craters',apply:pApplyMoon},{t:'bool',k:'relief',lbl:'relief noise',apply:pApplyMoon},{t:'bool',k:'grain',lbl:'grain',apply:pApplyMoon},{t:'bool',k:'maria',lbl:'maria',apply:pApplyMoon},
      {g:'Scene / FX'},{t:'range',k:'glyphs',lbl:'data glyphs',min:0,max:GMAX,step:20},{t:'bool',k:'stars',lbl:'bg stars',apply:pApplyScene},{t:'bool',k:'deco',lbl:'deco objects',apply:pApplyScene},{t:'bool',k:'impactFX',lbl:'impact FX'},{t:'bool',k:'invert',lbl:'invert flash'}
    ];
    function build(){
      body.innerHTML='';
      var prow=document.createElement('div');prow.className='prow';
      ['high','med','low'].forEach(function(p){var b=document.createElement('button');b.textContent=p;if(p===tier)b.style.background='#9f9';b.onclick=function(){autoQ=false;setTier(p,true);};prow.appendChild(b);});
      body.appendChild(prow);
      controls.forEach(function(c){
        if(c.g){var hd=document.createElement('div');hd.className='pg';hd.textContent=c.g;body.appendChild(hd);return;}
        var row=document.createElement('label');row.className='pr';
        var nm=document.createElement('span');nm.textContent=c.lbl;row.appendChild(nm);
        if(c.t==='bool'){var cb=document.createElement('input');cb.type='checkbox';cb.checked=!!PERF[c.k];cb.onchange=function(){PERF[c.k]=cb.checked;if(c.apply)c.apply();};row.appendChild(cb);}
        else{var sl=document.createElement('input');sl.type='range';sl.min=c.min;sl.max=c.max;sl.step=c.step;sl.value=PERF[c.k];var vb=document.createElement('b');var dec=(c.step<1)?2:0;vb.textContent=(+PERF[c.k]).toFixed(dec);sl.oninput=function(){PERF[c.k]=+sl.value;vb.textContent=(+sl.value).toFixed(dec);if(c.apply)c.apply();};row.appendChild(sl);row.appendChild(vb);}
        body.appendChild(row);
      });
    }
    window.pRebuild=build;
    build();
  }
}
</script>
